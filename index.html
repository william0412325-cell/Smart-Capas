<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Capas</title>
</head>
<body>

<h1>📱 Smart Capas</h1>

<p>Digite o modelo do seu celular:</p>

<input type="text" id="modelo"
placeholder="Ex: iPhone 15, Galaxy A35, Redmi Note 13">

<br><br>

<button onclick="enviarWhats()">Fazer Pedido</button>

<script>

function enviarWhats() {

    let modelo = document.getElementById("modelo").value;

    let mensagem =
    "Olá! Quero uma capa para o modelo: " + modelo;

    window.open(
    "https://wa.me/5575982952428?text=" +
    encodeURIComponent(mensagem)
    );
}

</script>

</body>
</html>
